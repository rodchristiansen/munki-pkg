name: 'munkipkg build'
description: 'Build an Apple installer package from a munkipkg project directory'
author: 'rodchristiansen'

inputs:
  project-path:
    description: 'Path to the munkipkg package project directory'
    required: true
  version:
    description: 'Override the build-info version (e.g. a git tag). Maps to --pkg-version.'
    required: false
    default: ''
  output-dir:
    description: 'Directory to write the built package into. Maps to --output-dir.'
    required: false
    default: 'dist'
  munkipkg-version:
    description: 'Release tag of munkipkg to use, or "latest".'
    required: false
    default: 'latest'
  lint:
    description: 'If "true", run `munkipkg --lint` before building and fail on lint errors.'
    required: false
    default: 'false'
  verify:
    description: 'If "true", pass --verify so a signed/notarized build is checked after building.'
    required: false
    default: 'false'
  extra-args:
    description: 'Additional arguments appended to the munkipkg build invocation.'
    required: false
    default: ''

outputs:
  pkg-path:
    description: 'Path to the built package'
    value: ${{ steps.build.outputs.pkg-path }}
  version:
    description: 'Version of the built package'
    value: ${{ steps.build.outputs.version }}
  sha256:
    description: 'SHA-256 of the built package'
    value: ${{ steps.build.outputs.sha256 }}

runs:
  using: composite
  steps:
    - name: Download munkipkg
      shell: bash
      env:
        MUNKIPKG_VERSION: ${{ inputs.munkipkg-version }}
      run: |
        set -euo pipefail
        repo="rodchristiansen/munki-pkg"
        if [ "$MUNKIPKG_VERSION" = "latest" ]; then
          url="https://github.com/$repo/releases/latest/download/munkipkg"
        else
          url="https://github.com/$repo/releases/download/$MUNKIPKG_VERSION/munkipkg"
        fi
        runner_tmp="${RUNNER_TEMP:-/tmp}"
        curl -fsSL -o "$runner_tmp/munkipkg" "$url"
        chmod +x "$runner_tmp/munkipkg"
        echo "$runner_tmp" >> "$GITHUB_PATH"
        "$runner_tmp/munkipkg" --version

    - name: Lint
      if: ${{ inputs.lint == 'true' }}
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: munkipkg --lint "$PROJECT_PATH"

    - name: Build
      id: build
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        PKG_VERSION: ${{ inputs.version }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        DO_VERIFY: ${{ inputs.verify }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail
        args=(--build --no-import --output-format json --output-dir "$OUTPUT_DIR")
        if [ -n "$PKG_VERSION" ]; then
          args+=(--pkg-version "$PKG_VERSION")
        fi
        if [ "$DO_VERIFY" = "true" ]; then
          args+=(--verify)
        fi
        if [ -n "$EXTRA_ARGS" ]; then
          read -ra extra <<< "$EXTRA_ARGS"
          args+=("${extra[@]}")
        fi
        result="$(munkipkg "${args[@]}" "$PROJECT_PATH")"
        echo "$result"
        echo "pkg-path=$(echo "$result" | jq -r '.pkg_path')" >> "$GITHUB_OUTPUT"
        echo "version=$(echo "$result" | jq -r '.version')" >> "$GITHUB_OUTPUT"
        echo "sha256=$(echo "$result" | jq -r '.sha256')" >> "$GITHUB_OUTPUT"
