# Runs the test suite on every push and pull request so changes are gated by
# `make test`. Build is exercised implicitly (make test depends on a compile).

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version

      - name: Build
        run: make release

      - name: Test
        run: make test
