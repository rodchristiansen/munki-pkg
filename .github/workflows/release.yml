# Builds munkipkg and publishes it as a GitHub release. Run it manually from
# the Actions tab (or `gh workflow run release.yml`). The release version is the
# YYYY.MM.DD.HHMM timestamp generated by `make version` at build time.
# MunkiStudio's "Download & Install munkipkg" fetches the release asset named
# "munkipkg"; the composite action (action.yml) fetches the same asset.
#
# Code signing and notarization are opt-in by secret presence, so a fork can run
# this workflow without secrets and still get a working (ad-hoc signed) binary
# plus a SHA256SUMS checksum file:
#
#   DEVELOPER_ID_APPLICATION_CERT           base64 of a Developer ID Application .p12
#   DEVELOPER_ID_APPLICATION_CERT_PASSWORD  password for that .p12
#   NOTARY_API_KEY_ID                       App Store Connect API key id
#   NOTARY_API_KEY_ISSUER_ID                App Store Connect API issuer id
#   NOTARY_API_KEY                          base64 of the App Store Connect .p8 key
#
# With the cert secrets present the binary is Developer ID signed with a hardened
# runtime; with the notary secrets also present it is notarized. A standalone
# binary cannot be stapled, so Gatekeeper verifies the notarization online.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version

      - name: Build release binary
        run: make release

      - name: Read version
        id: version
        run: |
          VERSION="$(sed -nE 's/.*let VERSION = "(.*)".*/\1/p' munkipkg/version.swift)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sign binary
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          CERT_PW: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp .build/release/munkipkg dist/munkipkg
          if [ -n "${CERT_B64:-}" ]; then
            KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
            KEYCHAIN_PW="$(uuidgen)"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            printf '%s' "$CERT_B64" | base64 -D > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
            if [ -z "$IDENTITY" ]; then
              echo "::error::DEVELOPER_ID_APPLICATION_CERT present but no Developer ID Application identity found in it"
              security delete-keychain "$KEYCHAIN"
              exit 1
            fi
            # Pass the keychain explicitly rather than making it the default, so the
            # runner's keychain state is untouched; delete it right after signing.
            codesign --keychain "$KEYCHAIN" --force --options runtime --timestamp --sign "$IDENTITY" dist/munkipkg
            codesign --verify --strict --verbose=2 dist/munkipkg
            security delete-keychain "$KEYCHAIN"
            rm -f "$RUNNER_TEMP/cert.p12"
            echo "SIGNED=1" >> "$GITHUB_ENV"
            echo "Developer ID signed."
          else
            codesign --force --sign - dist/munkipkg
            echo "No Developer ID secrets present; ad-hoc signed."
          fi
          chmod 755 dist/munkipkg

      - name: Notarize binary
        if: env.SIGNED == '1'
        env:
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_API_KEY_ISSUER_ID }}
          KEY_B64: ${{ secrets.NOTARY_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${KEY_ID:-}" ] || [ -z "${ISSUER_ID:-}" ] || [ -z "${KEY_B64:-}" ]; then
            echo "Notary secrets absent; skipping notarization."
            exit 0
          fi
          printf '%s' "$KEY_B64" | base64 -D > "$RUNNER_TEMP/notary.p8"
          ( cd dist && /usr/bin/zip -q munkipkg.zip munkipkg )
          xcrun notarytool submit dist/munkipkg.zip \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait
          rm -f dist/munkipkg.zip "$RUNNER_TEMP/notary.p8"
          echo "Notarized. A standalone binary can't be stapled; Gatekeeper verifies online."

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 munkipkg > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" dist/munkipkg dist/SHA256SUMS \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes
