# Builds munkipkg and publishes it as a GitHub release. Run it manually
# from the Actions tab (or `gh workflow run release.yml`). The release
# version is the YYYY.MM.DD.HHMM timestamp generated by `make version`
# at build time. MunkiStudio's "Download & Install munkipkg" fetches the
# release asset named "munkipkg".
#
# For signed/notarized distribution, add a Developer ID identity and use
# the Makefile's `sign` target with repo secrets.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version

      - name: Build release binary
        run: make release

      - name: Read version
        id: version
        run: |
          VERSION="$(sed -nE 's/.*let VERSION = "(.*)".*/\1/p' munkipkg/version.swift)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage binary
        run: |
          mkdir -p dist
          cp .build/release/munkipkg dist/munkipkg
          codesign --force --sign - dist/munkipkg
          chmod 755 dist/munkipkg

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" dist/munkipkg \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes
